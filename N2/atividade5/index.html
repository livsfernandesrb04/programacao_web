<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>template</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>
<body>
    <div class="container">

        <div class="row">
            <div class="col-12 text-center mt-3 mb-3">
                <h1>Agendamento</h1>
            </div>
        </div>

        <form action="">

            <div class="row mt-3">
                <div class="col-12">
                    <h3>Dados do paciente</h3>
                </div>
                <div class="col-6 mt-1">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" id="nome" name="nome" class="form-control">
                </div>
                <div class="col-6 mt-1">
                    <label for="sobrenome" class="form-label">Sobrenome</label>
                    <input type="text" id="sobrenome" name="sobrenome" class="form-control">
                </div>
                <div class="col-6 mt-1">
                    <label for="CPF" class="form-label">CPF</label>
                    <input type="number" id="cpf" name="cpf" class="form-control">
                </div>
                <div class="col-6 mt-1">
                    <label for="data_nascimento" class="form-label">Data de nascimento</label>
                    <input type="date" id="data_nascimento" name="data_nascimento" class="form-control">
                </div>
                <div class="col-6 mt-1">
                    <label for="telefone" class="form-label">Telefone</label>
                    <input type="tel"  id="telefone" name="telefone" pattern="\([0-9]{2}\) [0-9]{4,5}-[0-9]{4}" class="form-control">
                </div>
                <div class="col-6 mt-1">
                    <label for="CEP" class="form-label">CEP</label>
                    <input type="text" id="CEP" name="CEP" class="form-control">
                </div>
                <div class="col-12 mt-1">
                    <label for="endereco" class="form-label">Endereço</label>
                    <input type="text" id="endereco" name="endereco" class="form-control">
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-12">
                    <h3>Dados do paciente</h3>
                </div>
                <div class="col-6 mt-1">
                    <label for="clinica" class="form-label">Clínica</label>
                    <select list="clinicas" id="clinica" name="clinica" class="form-control">
                        <option value=""></option>
                        <option value=""></option>
                        <option value=""></option>
                        <option value=""></option>
                    </select>
                </div>
                <div class="col-6 mt-1">
                    <label for="especialidade" class="form-label">Especialidade</label>
                    <select id="especialidade" name="especialidade" class="form-control">
                        <option value="clinica_medica">Clínica Médica</option>
                        <option value="pediatria">Pediatria</option>
                        <option value="ginecologia_obstetricia">Ginecologia e Obstetrícia</option>
                        <option value="cardiologia">Cardiologia</option>
                        <option value="ortopedia">Ortopedia</option>
                        <option value="dermatologia">Dermatologia</option>
                    </select>
                </div>
                <div class="col-6 mt-1">
                    <label for="data_da_consulta" class="form-label">Data da consulta</label>
                    <input type="date" id="data_da_consulta" name="data_da_consulta" class="form-control">
                </div>
                <div class="col-6 mt-1">
                    <label for="hora_da_consulta" class="form-label">Hora da consulta</label>
                    <input type="time" id="hora_da_consulta" name="hora_da_consulta" class="form-control">
                </div>
                <div class="col-12 mt-1">
                    <label for="observacao" class="form-label">Observação</label>
                    <input type="text" id="observacao" name="observacao" class="form-control">
                </div>
                
            </div>
            <div class="col-12 mt-3">
                <input type="button" value="Enviar"/>
            </div>
        </form>
    </div>
</body>
</html>
